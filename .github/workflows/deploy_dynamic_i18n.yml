name: Publish dynamic i18n
on:
  repository_dispatch:
    types:
      - deploy-dynamic-i18n
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    concurrency: dynamic-i18n-build
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3
        with:
          repository: immersive-translate/extension
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
      - name: Clone repo
        run: git clone https://$PERSONAL_GITHUB_TOKEN@github.com/immersive-translate/config repo
        env:
          PERSONAL_GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.8.1
      - name: Generate dynamic i18n
        run: make generatedynamici18n target=repo/dist/dynamic-i18n.json
      - name: commit
        env:
          PERSONAL_GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
        run: |
          cd repo
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add dist/dynamic-i18n.json
          git commit -m "update dynamic-i18n.json"
          git remote -v
          git push
